name: CI - Train & Validate

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  train-validate:
    runs-on: ubuntu-latest

    env:
      DATA_PATH: dataset/GooglePlay_App_Data.csv
      TEXT_COL: review_description
      TITLE_COL: review_title
      USE_RATING: "true"
      RATING_COL: rating
      MIN_ACCURACY: "0.70"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r model/requirements.txt

      - name: Train model
        run: |
          python model/train.py \
            --data_path "$DATA_PATH" \
            --text_col "$TEXT_COL" \
            --title_col "$TITLE_COL" \
            --use_rating \
            --rating_col "$RATING_COL"

      - name: Verify artifacts
        run: |
          test -f model/artifacts/tfidf.pkl
          test -f model/artifacts/sentiment_model.pkl
          test -f model/artifacts/metrics.json

      - name: Validate accuracy threshold
        run: |
          python - <<'PY'
          import json, os
          min_acc = float(os.getenv("MIN_ACCURACY", "0.70"))
          with open("model/artifacts/metrics.json","r") as f:
              m = json.load(f)
          acc = float(m["accuracy"])
          print("Accuracy:", acc)
          if acc < min_acc:
              raise SystemExit(f"Accuracy below threshold ({min_acc}). Failing CI.")
          PY