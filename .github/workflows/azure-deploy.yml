name: CD - Deploy to Azure Container Apps

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/AI510-Project
          acrName: ${{ secrets.AZURE_ACR_NAME }}
          containerAppName: ${{ secrets.AZURE_CONTAINERAPP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RG }}
          containerAppEnvironment: ${{ secrets.AZURE_CONTAINERAPP_ENV }}
          environmentVariables: |
            PORT=8000
            ARTIFACTS_DIR=model/artifacts
            MIN_CONFIDENCE=0.55