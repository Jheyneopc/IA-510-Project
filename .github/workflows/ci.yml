name: CI - Train & Validate

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  train-validate:
    runs-on: ubuntu-latest

    env:
      PROJECT_DIR: AI510-Project
      DATA_PATH: AI510-Project/dataset/GooglePlay_App_Data.csv
      TEXT_COL: review_description
      TITLE_COL: review_title
      USE_RATING: "true"
      RATING_COL: rating
      MIN_ACCURACY: "0.70"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r "$PROJECT_DIR/model/requirements.txt"

      - name: Train model
        run: |
          python "$PROJECT_DIR/model/train.py" \
            --data_path "$DATA_PATH" \
            --text_col "$TEXT_COL" \
            --title_col "$TITLE_COL" \
            --use_rating \
            --rating_col "$RATING_COL"

      - name: Verify artifacts
        run: |
          test -f "$PROJECT_DIR/model/artifacts/tfidf.pkl"
          test -f "$PROJECT_DIR/model/artifacts/sentiment_model.pkl"
          test -f "$PROJECT_DIR/model/artifacts/metrics.json"

      - name: Validate accuracy threshold
        run: |
          python - <<'PY'
          import json, os
          project_dir = os.getenv("PROJECT_DIR", "AI510-Project")
          min_acc = float(os.getenv("MIN_ACCURACY", "0.70"))
          metrics_path = os.path.join(project_dir, "model", "artifacts", "metrics.json")

          with open(metrics_path, "r") as f:
              m = json.load(f)

          acc = float(m["accuracy"])
          print("Accuracy:", acc)

          if acc < min_acc:
              raise SystemExit(f"Accuracy below threshold ({min_acc}). Failing CI.")
          PY